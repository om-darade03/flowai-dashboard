<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Bar chart bars (productivity/analytics icon) -->
  <rect x="5" y="18" width="5" height="9" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="12" y="12" width="5" height="15" rx="1.5" fill="rgba(255,255,255,0.75)"/>
  <rect x="19" y="7" width="5" height="20" rx="1.5" fill="white"/>

  <!-- Upward trend arrow on top right -->
  <polyline points="19,7 24,2 24,7" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
